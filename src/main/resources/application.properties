# H2 in-memory database - resets every time you restart the app
spring.datasource.url=jdbc:h2:mem:jobtracker
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Auto-create DB tables from your Java entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 web console - lets you browse your DB at http://localhost:8080/h2-console
spring.h2.console.enabled=true
